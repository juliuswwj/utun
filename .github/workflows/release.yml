name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Binaries
        run: |
          mkdir -p dist
          # 编译 amd64 版本
          GOOS=linux GOARCH=amd64 go build -o dist/utun-linux-amd64 ./cmd/utun/main.go
          # 编译 arm64 版本
          GOOS=linux GOARCH=arm64 go build -o dist/utun-linux-arm64 ./cmd/utun/main.go

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          # 如果是推送 master 分支，则更新 'latest' 标签和 Release
          # 如果是推送 tag (v*)，则创建对应版本的 Release
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Auto-Build' }}
          files: |
            dist/utun-linux-amd64
            dist/utun-linux-arm64
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          make_latest: ${{ github.ref_type == 'tag' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
